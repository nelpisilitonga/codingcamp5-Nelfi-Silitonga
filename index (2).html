<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="container">
        <!-- Header: Greeting + Waktu -->
        <header>
            <h1 id="greeting">Selamat Pagi, User!</h1>
            <div id="datetime">
                <span id="date"></span> | <span id="time"></span>
            </div>
            <!-- Tombol Dark/Light Mode (Challenge 1) -->
            <button id="themeToggle">🌙 Dark Mode</button>
        </header>

        <!-- Bagian Focus Timer -->
        <section class="timer-section">
            <h2>⏱️ Focus Timer</h2>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-controls">
                <button id="timerStart">▶️ Mulai</button>
                <button id="timerStop">⏹️ Berhenti</button>
                <button id="timerReset">🔄 Reset</button>
            </div>
            <!-- Input custom timer (Challenge 3) -->
            <div class="timer-custom">
                <label>Ubah durasi (menit):</label>
                <input type="number" id="customTimerInput" value="25" min="1" max="60" />
                <button id="setTimerBtn">Atur</button>
            </div>
        </section>

        <!-- Bagian To-Do List -->
        <section class="todo-section">
            <h2>✅ To-Do List</h2>
            <div class="todo-input-group">
                <input type="text" id="todoInput" placeholder="Tambah tugas baru..." />
                <button id="addTodoBtn">Tambah</button>
            </div>
            <ul id="todoList"></ul>
        </section>

        <!-- Bagian Quick Links -->
        <section class="links-section">
            <h2>🔗 Quick Links</h2>
            <div class="links-input-group">
                <input type="text" id="linkName" placeholder="Nama situs" />
                <input type="url" id="linkUrl" placeholder="URL (https://...)" />
                <button id="addLinkBtn">Tambah Link</button>
            </div>
            <div id="linkContainer"></div>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
